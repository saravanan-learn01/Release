# Azure DevOps Pipeline YAML Structure
# Generated from: kolappan88_Kols-1st-test_dev_and_qa_7.json
name: $(Date:yyyyMMdd).$(Rev:r)

trigger: none

resources:
  pipelines:
    - pipeline: _dsa
      source: dsa
      trigger: none

stages:
  # Dev Environment
  - stage: DEV
    displayName: 'Dev'
    condition: succeeded()
    jobs:
    - deployment: Deploy_DEV
      displayName: 'Deploy to Dev'
      pool:
        name: 'Default'
      environment: 'Dev'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: Maven@4
              displayName: 'Maven pom.xml'
              inputs:
                ConnectedServiceName: ''
                mavenPOMFile: 'pom.xml'
                goals: 'package'
                options: ''
                publishJUnitResults: 'true'
                testResultsFiles: '**/surefire-reports/TEST-*.xml'
                testRunTitle: ''
                allowBrokenSymbolicLinks: 'true'
                codeCoverageTool: 'None'
                classFilter: ''
                classFilesDirectories: ''
                srcDirectories: ''
                failIfCoverageEmpty: 'false'
                restoreOriginalPomXml: 'false'
                javaHomeSelection: 'JDKVersion'
                jdkVersion: 'default'
                jdkUserInputPath: ''
                jdkArchitecture: 'x64'
                mavenVersionSelection: 'Default'
                mavenPath: ''
                mavenSetM2Home: 'false'
                mavenOpts: '-Xmx1024m'
                mavenFeedAuthenticate: 'false'
                skipEffectivePom: 'false'
                sqAnalysisEnabled: 'false'
                isJacocoCoverageReportXML: 'false'
                sqMavenPluginVersionChoice: 'latest'
                checkstyleAnalysisEnabled: 'false'
                pmdAnalysisEnabled: 'false'
                findbugsAnalysisEnabled: 'false'
                spotBugsAnalysisEnabled: 'false'
                spotBugsMavenPluginVersion: '4.5.3.0'
                spotBugsGoal: 'spotbugs'
                spotBugsFailWhenBugsFound: 'true'

  # QA Environment
  - stage: QA
    displayName: 'QA'
    dependsOn: DEV
    condition: succeeded('DEV')
    jobs:
    - deployment: Deploy_QA
      displayName: 'Deploy to QA'
      pool:
        name: 'Azure Pipelines'
      environment: 'QA'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: CopyPublishArtifact@1
              displayName: 'Copy Publish Artifact: Dev and qa'
              inputs:
                CopyRoot: ''
                Contents: '12'
                ArtifactName: 'Dev and qa'
                ArtifactType: 'FilePath'
                TargetPath: '\\my\share\$(Build.DefinitionName)\$(Build.BuildNumber)'
