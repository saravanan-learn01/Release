# Azure DevOps Pipeline YAML Structure
# Generated from: kolappan88_Kols-1st-test_3_5.json
name: $(Date:yyyyMMdd).$(Rev:r)

trigger: none

resources:
  pipelines:
    - pipeline: _dsa
      source: dsa
      trigger: none

stages:
  # DEV Environment
  - stage: DEV
    displayName: 'DEV'
    condition: succeeded()
    jobs:
    - deployment: Deploy_DEV
      displayName: 'Deploy to DEV'
      pool:
        vmImage: 'windows-latest'
      environment: 'DEV'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: CopyPublishArtifact@1
              displayName: 'Copy Publish Artifact: MAVERICK'
              inputs:
                CopyRoot: '$(System.DefaultWorkingDirectory)/_dsa'
                Contents: 'NEW '
                ArtifactName: 'MAVERICK'
                ArtifactType: 'FilePath'
                TargetPath: '\\my\share\$(Build.DefinitionName)\$(Build.BuildNumber)'

            - task: Ant@1
              displayName: 'Ant  build.xml'
              inputs:
                antBuildFile: 'build.xml'
                options: ''
                targets: ''
                publishJUnitResults: 'true'
                testResultsFiles: '**/TEST-*.xml'
                testRunTitle: ''
                codeCoverageTool: 'None'
                classFilesDirectories: '.'
                classFilter: ''
                srcDirectories: ''
                failIfCoverageEmpty: 'false'
                antHomeUserInputPath: ''
                javaHomeSelection: 'JDKVersion'
                jdkVersion: 'default'
                jdkUserInputPath: ''
                jdkArchitecture: 'x64'

            - task: DotNetCoreCLI@2
              displayName: 'dotnet build'
              inputs:
                ConnectedServiceName: ''
                command: 'build'
                publishWebProjects: 'true'
                projects: ''
                custom: ''
                arguments: ''
                restoreArguments: ''
                publishTestResults: 'true'
                testRunTitle: ''
                zipAfterPublish: 'true'
                modifyOutputPath: 'true'
                selectOrConfig: 'select'
                feedRestore: ''
                includeNuGetOrg: 'true'
                nugetConfigPath: ''
                externalEndpoints: ''
                noCache: 'false'
                packagesDirectory: ''
                verbosityRestore: 'Normal'
                searchPatternPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
                nuGetFeedType: 'internal'
                feedPublish: ''
                publishPackageMetadata: 'true'
                externalEndpoint: ''
                searchPatternPack: '**/*.csproj'
                configurationToPack: '$(BuildConfiguration)'
                outputDir: '$(Build.ArtifactStagingDirectory)'
                nobuild: 'false'
                includesymbols: 'false'
                includesource: 'false'
                versioningScheme: 'off'
                versionEnvVar: ''
                requestedMajorVersion: '1'
                requestedMinorVersion: '0'
                requestedPatchVersion: '0'
                buildProperties: ''
                verbosityPack: 'Normal'
                workingDirectory: ''
                requestTimeout: '300000'

            - task: Grunt@0
              displayName: 'grunt '
              inputs:
                gruntFile: 'gruntfile.js'
                targets: ''
                arguments: ''
                cwd: ''
                gruntCli: 'node_modules/grunt-cli/bin/grunt'
                publishJUnitResults: 'false'
                testResultsFiles: '**/TEST-*.xml'
                testRunTitle: ''
                enableCodeCoverage: 'false'
                testFramework: 'Mocha'
                srcFiles: ''
                testFiles: 'test/*.js'

  # QA-DSA Environment
  - stage: QA_DSA
    displayName: 'QA-DSA'
    dependsOn: DEV
    condition: failed('DEV')
    jobs:
    - deployment: Deploy_QA_DSA
      displayName: 'Deploy to QA-DSA'
      pool:
        vmImage: 'windows-latest'
      environment: 'QA-DSA'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: PublishBuildArtifacts@1
              displayName: 'Publish Artifact: drop'
              inputs:
                PathtoPublish: '$(Build.ArtifactStagingDirectory)'
                ArtifactName: 'drop'
                ArtifactType: 'Container'
                MaxArtifactSize: '0'
                TargetPath: ''
                Parallel: 'false'
                ParallelCount: '8'
                StoreAsTar: 'false'

            - task: KubectlInstaller@0
              displayName: 'Install Kubectl latest'
              inputs:
                kubectlVersion: 'latest'

            - task: NuGetAuthenticate@1
              displayName: 'NuGet Authenticate'
              inputs:
                workloadIdentityServiceConnection: ''
                feedUrl: ''
                forceReinstallCredentialProvider: 'false'
                nuGetServiceConnections: ''

  # UAT Environment
  - stage: UAT
    displayName: 'UAT'
    dependsOn: QA_DSA
    condition: succeeded('QA_DSA')
    jobs:
    - deployment: Deploy_UAT
      displayName: 'Deploy to UAT'
      pool:
        name: 'Default'
      environment: 'UAT'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: ArchiveFiles@2
              displayName: 'Archive $(Build.BinariesDirectory)'
              inputs:
                rootFolderOrFile: '$(Build.BinariesDirectory)'
                includeRootFolder: 'true'
                archiveType: 'zip'
                sevenZipCompression: 'normal'
                tarCompression: 'gz'
                archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
                replaceExistingArchive: 'true'
                verbose: 'false'
                quiet: 'false'

            - task: DeleteFiles@1
              displayName: 'Delete files from '
              inputs:
                SourceFolder: ''
                Contents: 'myFileShare'
                RemoveSourceFolder: 'false'
                RemoveDotFiles: 'false'

            - task: Gradle@4
              displayName: 'gradlew build'
              inputs:
                wrapperScript: 'gradlew'
                cwd: ''
                options: ''
                tasks: 'build'
                publishJUnitResults: 'true'
                testResultsFiles: '**/TEST-*.xml'
                testRunTitle: ''
                javaHomeSelection: 'JDKVersion'
                jdkVersion: 'default'
                jdkUserInputPath: ''
                jdkArchitecture: 'x64'
                gradleOpts: '-Xmx1024m'
                sqAnalysisEnabled: 'false'
                sqGradlePluginVersionChoice: 'specify'
                sqGradlePluginVersion: '2.6.1'
                checkstyleAnalysisEnabled: 'false'
                findbugsAnalysisEnabled: 'false'
                pmdAnalysisEnabled: 'false'
                spotBugsAnalysisEnabled: 'false'
                spotBugsGradlePluginVersionChoice: 'specify'
                spotbugsGradlePluginVersion: '4.7.0'
