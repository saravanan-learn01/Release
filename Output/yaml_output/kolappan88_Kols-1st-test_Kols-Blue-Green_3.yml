# Azure DevOps Pipeline YAML Structure
# Generated from: kolappan88_Kols-1st-test_Kols-Blue-Green_3.json
name: $(Date:yyyyMMdd).$(Rev:r)

trigger: none

resources:
  pipelines:
    # No artifacts found

stages:
  # Stage 1 Environment
  - stage: STAGE_1
    displayName: 'Stage 1'
    condition: succeeded()
    jobs:
    - deployment: Deploy_STAGE_1
      displayName: 'Deploy to Stage 1'
      pool:
        vmImage: 'windows-latest'  # Default pool
      environment: 'Stage 1'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: ManualIntervention@8
              displayName: 'Manual Intervention'
              inputs:
                instructions: 'Resume this run if deployment to green environment is stable and tested successfully. During this pause you may also redirect the traffic to the green environment. '
                emailRecipients: ''
                onTimeout: 'reject'

            - task: PowerShell@2
              displayName: 'PowerShell Script'
              inputs:
                targetType: 'inline'
                filePath: ''
                arguments: ''
                script: |
                  $blueTag = 'blue'
                  $greenTag = 'green'
                  $deploymentGroupId='$(deploymentGroupId)'
                  
                  $PAT = ':$(patToken)'
                  $base64AuthInfo = [System.Convert]::ToBase64String([System.Text.Encoding]::ASCII.GetBytes($PAT))
                  
                  function GetVMsForTag {
                  Param([string]$tag)
                  
                  	$uri = $env:SYSTEM_TEAMFOUNDATIONCOLLECTIONURI + $env:SYSTEM_TEAMPROJECT + '/_apis/distributedtask/deploymentgroups/' + $deploymentGroupId + '/targets?tags=' + $tag
                  
                  	return  Invoke-RestMethod -Uri $uri -Method Get -Headers @{Authorization=('Basic {0}' -f $base64AuthInfo)}
                  }
                  
                  function GetVMJsonWithSwitchedTags {
                  Param([PSCustomObject]$vmResources, [string]$oldtag, [string]$newtag)
                  
                  	$allVMs = New-Object Collections.Generic.List[PSCustomObject]
                  
                  	foreach ($vmResource in $vmResources)
                  	{
                  		$vm=@{}
                  		$vm.id = $vmResource.id
                  		
                  		$tags = @()
                  		$tags += $newtag
                  		foreach ($tag in $vmResource.tags)
                  		{ 
                  			if ($tag -ne $oldtag)
                  			{
                  				$tags += $tag
                  			}
                  		}
                  		$vm.tags = $tags
                  
                  		$allVMs.Add($vm)
                  	}
                  	
                  	return  ConvertTo-Json $allVMs 
                  }
                  
                  function SwitchTags {
                  Param([PSCustomObject]$vmResources, [string]$oldtag, [string]$newtag)
                  	
                  	$body = GetVMJsonWithSwitchedTags -vmResources $vmResources -oldtag $oldtag -newtag $newtag
                  
                  	$uri = $env:SYSTEM_TEAMFOUNDATIONCOLLECTIONURI + $env:SYSTEM_TEAMPROJECT + '/_apis/distributedtask/deploymentgroups/' + $deploymentGroupId + '/targets?api-version=5.1-preview.1'
                  
                  	Invoke-RestMethod -Uri $uri -Method Patch -Body $body -ContentType 'application/json' -Headers @{Authorization=('Basic {0}' -f $base64AuthInfo)}
                  }
                  
                  $greenVMs = GetVMsForTag -tag $greenTag
                  $blueVMs = GetVMsForTag -tag $blueTag
                  
                  if ($greenVMs.count -gt 0)
                  {
                  	SwitchTags -vmResources $greenVMs.value -oldtag $greenTag -newtag $blueTag
                  }
                  else
                  {
                  	Write-Output 'No green tagged VM(s) found'
                  }
                  
                  if ($blueVMs.count -gt 0)
                  {
                  	SwitchTags -vmResources $blueVMs.value -oldtag $blueTag -newtag $greenTag
                  }
                  else
                  {
                  	Write-Output 'No blue tagged VM(s) found'
                  }
                errorActionPreference: 'stop'
                warningPreference: 'default'
                informationPreference: 'default'
                verbosePreference: 'default'
                debugPreference: 'default'
                progressPreference: 'silentlyContinue'
                failOnStderr: 'false'
                showWarnings: 'false'
                ignoreLASTEXITCODE: 'false'
                pwsh: 'false'
                workingDirectory: ''
                runScriptInSeparateScope: 'false'
